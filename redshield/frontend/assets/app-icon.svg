<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="shield-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ef4444"/>
      <stop offset="100%" style="stop-color:#7f1d1d"/>
    </linearGradient>
    <linearGradient id="inner-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#dc2626"/>
      <stop offset="100%" style="stop-color:#991b1b"/>
    </linearGradient>
    <linearGradient id="glow" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" style="stop-color:#fca5a5;stop-opacity:0.4"/>
      <stop offset="100%" style="stop-color:#ef4444;stop-opacity:0"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="6" stdDeviation="12" flood-color="#ef4444" flood-opacity="0.35"/>
    </filter>
    <filter id="inner-shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Fond (transparent, bordure subtile) -->
  <circle cx="256" cy="256" r="252" fill="none"/>
  <circle cx="256" cy="256" r="244" fill="none" stroke="#ef444430" stroke-width="1.5"/>

  <!-- Anneau lumineux externe -->
  <circle cx="256" cy="256" r="230" fill="none" stroke="url(#glow)" stroke-width="3"/>

  <!-- Bouclier principal -->
  <path d="M256 58 L425 134 C425 134 435 318 256 454 C77 318 87 134 87 134 Z"
        fill="url(#shield-grad)" filter="url(#shadow)" stroke="#f87171" stroke-width="2.5"/>

  <!-- Reflet subtil sur le bouclier -->
  <path d="M256 58 L425 134 C425 134 435 318 256 454"
        fill="none" stroke="#fca5a5" stroke-width="0.8" opacity="0.3"/>

  <!-- Bouclier intérieur -->
  <path d="M256 90 L398 155 C398 155 407 308 256 424 C105 308 114 155 114 155 Z"
        fill="url(#inner-grad)" opacity="0.5" stroke="#f87171" stroke-width="0.5"/>

  <!-- Lignes de circuit (style cyber) -->
  <g stroke="#f8717140" stroke-width="1.2" fill="none">
    <path d="M180 180 L180 220 L210 220"/>
    <path d="M332 180 L332 220 L302 220"/>
    <path d="M180 340 L180 300 L210 300"/>
    <path d="M332 340 L332 300 L302 300"/>
    <circle cx="180" cy="180" r="3" fill="#f87171" opacity="0.5"/>
    <circle cx="332" cy="180" r="3" fill="#f87171" opacity="0.5"/>
    <circle cx="180" cy="340" r="3" fill="#f87171" opacity="0.5"/>
    <circle cx="332" cy="340" r="3" fill="#f87171" opacity="0.5"/>
  </g>

  <!-- Signal WiFi au centre -->
  <g fill="none" stroke="#fef2f2" stroke-linecap="round" filter="url(#inner-shadow)">
    <!-- Point central -->
    <circle cx="256" cy="310" r="10" fill="#fef2f2" stroke="none"/>
    <!-- Ligne -->
    <path d="M256 295 L256 260" stroke-width="6"/>
    <!-- Arcs WiFi -->
    <path d="M212 252 Q256 212 300 252" stroke-width="6"/>
    <path d="M185 225 Q256 172 327 225" stroke-width="6"/>
    <path d="M158 198 Q256 130 354 198" stroke-width="6"/>
  </g>

  <!-- Badge check sécurité -->
  <g transform="translate(340, 370)">
    <circle cx="0" cy="0" r="34" fill="#15803d" stroke="none"/>
    <circle cx="0" cy="0" r="34" fill="none" stroke="#22c55e" stroke-width="1.5" opacity="0.6"/>
    <polyline points="-15,-1 -5,11 17,-11" fill="none" stroke="#f0fdf4" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
