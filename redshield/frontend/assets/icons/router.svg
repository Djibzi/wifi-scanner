<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  <!-- Boîtier routeur -->
  <rect x="4" y="24" width="40" height="14" rx="3" fill="#1e293b" stroke="#64748b" stroke-width="1.5"/>
  <!-- Ligne de ventilation -->
  <line x1="8" y1="35" x2="40" y2="35" stroke="#0f172a" stroke-width="1"/>
  <!-- LEDs -->
  <circle cx="10" cy="29" r="2" fill="#22c55e"/>
  <circle cx="10" cy="29" r="2" fill="#22c55e" opacity="0.4">
    <animate attributeName="opacity" values="0.4;0.8;0.4" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="16" cy="29" r="2" fill="#38bdf8"/>
  <circle cx="22" cy="29" r="2" fill="#38bdf8" opacity="0.5"/>
  <circle cx="28" cy="29" r="2" fill="#f59e0b" opacity="0.5"/>
  <!-- Ports ethernet -->
  <rect x="34" y="27" width="4" height="4" rx="0.5" fill="#0f172a" stroke="#475569" stroke-width="0.8"/>
  <!-- Antennes -->
  <line x1="14" y1="24" x2="10" y2="10" stroke="#64748b" stroke-width="2" stroke-linecap="round"/>
  <line x1="34" y1="24" x2="38" y2="10" stroke="#64748b" stroke-width="2" stroke-linecap="round"/>
  <circle cx="10" cy="9" r="2.5" fill="none" stroke="#64748b" stroke-width="1.5"/>
  <circle cx="38" cy="9" r="2.5" fill="none" stroke="#64748b" stroke-width="1.5"/>
  <!-- Signal WiFi -->
  <g stroke="#38bdf8" stroke-width="1.5" stroke-linecap="round" fill="none" opacity="0.6">
    <path d="M20 18 Q24 14 28 18"/>
    <path d="M17 14 Q24 8 31 14"/>
  </g>
</svg>
