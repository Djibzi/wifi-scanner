    <line x1="18" y1="16" x2="30" y2="16"/>
    <line x1="18" y1="19" x2="30" y2="19"/>
    <line x1="18" y1="22" x2="30" y2="22"/>
    <line x1="18" y1="25" x2="30" y2="25"/>
    <line x1="18" y1="28" x2="30" y2="28"/>
  </g>
  <!-- LED status -->
  <circle cx="24" cy="35" r="2.5" fill="#38bdf8" opacity="0.7">
    <animate attributeName="opacity" values="0.4;0.8;0.4" dur="3s" repeatCount="indefinite"/>
  </circle>
  <!-- Ondes sonores -->
  <g stroke="#38bdf8" stroke-width="1" fill="none" opacity="0.3">
